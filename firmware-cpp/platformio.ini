; PlatformIO project for HermesLens M5 StickS3 firmware
;
; Flash:  pio run -t upload
; Monitor: pio device monitor
;
; Builds a ~1.1 MB ELF for ESP32-S3. M5StickS3 auto-detected by M5Unified.
;
; NO custom partition table — uses the ESP32-S3 default which already includes
; NVS at 0x9000. Config is stored in NVS via Preferences.h, NOT SPIFFS.
; This means ONE .bin file = one-click flash in M5Burner or any web flasher.

[platformio]
default_envs = hermeslens-s3

[env:hermeslens-s3]
platform = espressif32@6.10.0
board = esp32-s3-devkitc-1
framework = arduino

; Use the built-in default partition table (NVS at 0x9000, no custom data partition)

; ══ Build flags ═════════════════════════════════════════════════
build_flags =
  -Iinclude                              ; shared headers (palette.hpp, font.hpp)
  -DCORE_DEBUG_LEVEL=3
  -DASYNCWEBSERVER_REGEX
  -DARDUINO_USB_MODE=1                   ; enable built-in USB Serial/JTAG CDC
  -DARDUINO_USB_CDC_ON_BOOT=1            ; start USB CDC early for serial monitoring
  -DARDUINO_RUNNING_CORE=1               ; pin Arduino tasks to core 1
  -DARDUINO_EVENT_RUNNING_CORE=1         ; pin WiFi/BT events to core 1

; ══ Upload / Monitor ═════════════════════════════════════════════
upload_port = /dev/ttyACM0              ; Override if needed: pio run -e hermeslens-s3 -t upload --upload-port /dev/ttyACM1
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ══ Post-build: merge into one flashable .bin ══════════════════════════════
; Produces hermeslens-s3-merged.bin (bootloader + partitions + app)
extra_scripts = post:scripts/post_build_merge.py

; ══ Libraries ═════════════════════════════════════════════════════
lib_deps =
  m5stack/M5Unified@^0.2.15
  m5stack/m5gfx@^0.2.21
  bblanchon/ArduinoJson@^6.21.0
  arduino-libraries/ArduinoHttpClient@^0.6.1
